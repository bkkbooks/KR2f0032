body:
  text: 兩垣奏議詔令奏議𩔖二奏議之屬提要臣等謹案兩垣奏議一巻明逯中立撰中立有周易劄記已著録是書凡奏議六篇皆中立為給事中時所上以歴官吏兵二科故稱兩垣其中論公用舍論修史用人及論㑹推閣臣三疏本末略具明史本𫝊蓋中立以是三疏一忤㫖停俸一見忌輔臣一被貶外授故史特摘録於本傳其請罷織造論東倭及請停例金三疏雖事不施行然亦皆矯矯不阿無愧封駁之職不得以巻帙之少廢之矣舊本附刻中立所作周易劄記後今既分𨽻四庫則列於經部為不倫故析出别著録焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書兩垣奏議明逯中立撰論公用舍疏臣惟朝廷有用舍之權而天下有是非之公用舍合於公則人服而議論自息用舎不合於公則人不服而議論日滋故曰王道本乎人情自古又未有上下異指大小臣異心邪正倒置衆論沸騰而可以言治者臣睹近來諸臣相繼而罷者率多砥行好修守正不阿之士如郎中譚一召疏中所云得罪棄置者六十餘人臣不敢謂其皆皭然君子然而為君子者多也而偶以一事固執一言觸忤遂令其牢落下僚跧伏田間壯志紆而不伸忠猷藴而未竟此臣所以深為諸臣惜也方今中外多故苦無任事之人而今被斥諸臣雖位有崇卑才有偏全皆國家所作養生平所砥礪今不使之為國家用而反令藉之以成其私名致感時者有憐才之嘆司銓者有乏才之憂此臣所以為世道惜也夫諸臣有以争國是而去者有以詆輔臣而去者又有以申救株連疑及輔臣而去者陛下怒言者則曰出朕獨斷而輔臣王錫爵之自解亦曰有主上親筆臣謂所罷者非正人也則斷自宸衷固主上去邪之眀即擬自閣臣正大臣為國之忠若所罷者果正人也出於閣臣之票擬而有心斥逐者為妬賢出於主上之裁决而不能匡救者為竊位彼職贊宻勿身膺隆眷不補牘力争而坐視忠良屏棄䜛佞鴟張雖間有揭救然而諸臣之擯斥者如故也大臣以人事君之道恐不如是故臣又為輔臣惜也今陛下欲安輔臣則罷言者言者罷而論者愈多論者多而輔臣益不自安即髙攀龍一疏惓惓為國惜才即部院大臣亦許其願忠之心矣中外諸臣亦多為之申解矣孫繼有譚一召之疏不無過激而扶正抑邪之言不無可採陛下重罰二臣以謝輔臣二臣罰而輔臣能自安乎臣聞防口甚於防川聖如虞舜猶察邇言而用之况泰交一疏輔臣不以淹棄諸臣請乎陛下以心旅托輔臣則何不行輔臣之言從中外臣工之願眀諭吏部於先後廢謫諸臣隨材錄用以示大公則君有容直之名臣無敢言之譽國家收多賢之益廟堂無處分之煩衆囂自息輔臣自安矣宋劉安世曰愛惜人才乃人主自為社稷計程顥曰朝廷不失於舉錯使議論何自而沸騰釋羣疑而收人心莫要於此然臣又有言焉留都銓卿以沈鯉推而不用尚寶司丞以李懋檜補而不允至於鄒元標慷慨大節海内屬目而不能一日立朝夫以陛下寛仁獨不能容一二直臣乎以輔臣見知於主獨不能為國用一二直臣乎端人短氣正士結舌清眀之朝不宜有此輔臣不思極力叩閽仰回天聽以收民譽而樹令名而徒忿衆口之呶呶以歸過於君父此臣所以義激於中不容黙黙也臣一介草茅䝉拔置吏垣感時效愚罔知忌諱伏惟聖眀裁納論罷太和山織造疏臣待罪諫垣竊見傳造太嶽太和山各宫殿頂帳費以萬金奉㫖本山量解香税銀七千兩仍命工部補足三千兩矣又戒諸臣之奏擾矣夫以供奉眀神而費止萬金又有眀㫖之凛凛也臣何敢復有陳説第考之祀典叅之時勢則見織造之命萬萬可已者敢披􅅹為皇上陳之臣惟太和山不列於嶽鎮𤣥武神不見於經傳所云静樂王太子入山脩鍊白日飛昇皆道家傅㑹之説儒者所不談雖我朝創廟宇設提督以崇祀之然非若天地嶽鎮海瀆等神為祭之正也古云黷于祭祀時謂弗欽禮煩則亂事神則難而况宫殿帷帳又供奉之彌文而非祭祀之常經乎故織造之可已也為國家釐祀典也東南災沴頻仍杼柚其空即袍服上供撫臣無嵗不請减請罷矣今又以頂帳之故嚴行新舊各堂添設機張人匠併工織造手指瘁於拮据皮肉殘於鞭扑且吏胥有需索之擾州縣有徴解之苦費以萬金而閭閻所費又數倍於此者乎夫以東南凋敝之時而何忍加之以額外之征輸也故織造之可已也為東南愛民力也王者為天下守財即財賦殷富之日猶當加意撙節而况公私交困府藏殫竭昨見主計之臣謂各邊鎮上半年例銀共該一百四十餘萬東那西凑尚少一半若太和山宫殿頂帳何益於神而出帑金以佐之雖曰數止三千然一銖一兩孰非赤子之膏脂乎是何取盡錙銖而用若泥沙也故織造之可已也為帑藏惜財用也方今徐淮兗豫之間千里一壑積骸盈野仳離之狀愁嘆之聲慘目悲心有不忍見且聞者昨河南撫臣張一元之疏可見矣天下之患莫大於下有疾苦而上不收䘏乃日者科臣王徳完為民請賑疏兩上而不報今頂悵無益之費近習無稽之言即以科部執奏而不允此臣之所以未解也臣謂太和山之香稅積之徒以供内臣之乾沒推之可以救中原之捐瘠織造之萬金以為頂帳之費則曰不經以為賑濟之資則曰德意臣又查萬厯十四年以山陜等處災傷發帑金三十九萬兩十七年以江南等處災傷發帑金三十萬兩遣官分賑今中原災傷不减於曩時而賑䘏之惠反嗇於曩時皇上為民父母忍視數百萬生靈嗷嗷待斃而不為之拯救者乎伏願亟停織造之命即以太和山香稅銀一萬兩并再發内帑銀二十萬兩遣廉能之官宣布德音太霈皇仁以示聖天子軫念災民之意則罷不經之費至儉也𢎞賑恤之恩至仁也廓轉圜之量至明也皇上何憚而不為此也然臣又有言焉京師者四方之極也今都門外宫觀之侈丹堊輝煌旛幔之飾綦組絢爛而委巷小民至傾貲破産以脩庵觀而供齋醮異説之惑世誣民甚矣皇上又復括已盡之財剥窮民之脂以供宫殿帷帳之飾則何以禁止愚民風示四方孟子曰楊墨之道不息孔子之道不著又曰君子反經而已矣經正則庻民興庻民興斯無邪慝矣眀正道以息邪説唯聖眀留意焉論東倭疏自東倭未靖而請封請貢之説興也中外諸臣言者甚夥其揣情形析利害者亦甚備雖三尺豎子亦知其不可矣臣即再陳説亦不能加於諸臣上矣顧是説也宋應昌始之顧養謙成之本兵石星力主之沈惟敬宻計於倭㓂劉黄裳昌言於朝請封易而為請貢請貢易而為開市開市易而為和親頃又專意請封業已奉有眀㫖矣臣竊維貢不可許而封亦不可許也是東征諸臣誤本兵而本兵因以誤國也臣始不能無言也臣聞忠臣之謀國也為國家計不為一身計為乆逺計不為旦夕計自倭㓂狂逞盤據朝鮮我皇上宵旰而憂為之遣將出師者既一年餘矣蹂躪我屬國戕殺我士卒縻費我金錢是中國仇也而臣子之羞也今不思滅此朝食而反欲寵以封號金冊銀章赫奕島外此可令四方見乎以國體論則倭不當封昨見朝鮮疏中有云倭㓂築城蓋房運糧練兵陽退而復進假和而逞兇倭之情狀亦可槩見而當事者以為難慿日夜催促表文以冀了事目前臣未聞空言可以畏敵表文可以守取即稱臣稱貢禮卑言甘臣之所不敢信也以倭情論則倭不必封倭俗狙詐而狼貪聖祖絶其貢不與通著之為訓沿海設備嗣是屢貢屢犯至嘉靖間東南之慘極矣世祖赫然用武一大創之而有三十餘年之安今無以制其死命而以封為羈縻彼闗酋雄長海外即稱帝稱王夫誰禁之而乃遣數十萬之師犯我屬國丐此虗名也勢必請封請市要求不已我不能拒絶於今日而安能拒絶於異日啟奸民勾引之端開外國窺伺之門為國家患無已時以利害論則倭不可封此其事之可否得失滿朝臣工知之朝鮮知之而何當事者以㝠㝠决事不曰選將不曰練兵不曰沿海脩備而今日議封眀日議貢倭盤據於釡山為攻取之計我冀望於僥倖為茍且之謀倭以欵要我而操術常行於欵之外我以欵自愚而智慮常陷於欵之中排盈庭之公論損戰守之長䇿沮忠臣義士之氣為逃責議功之資此人臣之利非國家之福也旦夕之謀非乆逺之計也豈不羞朝廷而汚青史哉臣謂倭欵不罷則戰守之計不决戰守之計不决則釀禍將来貽憂君父異時追尤首事即斬諸臣之頭不足以謝國事矣且皇上獨不見西事乎當互市之始豈不借口羈縻得以息肩飭備而今邊務廢弛將士玩愒不可收拾識者恨之今日又欲襲其故智以為退倭良䇿尚可謂國有人乎伏望皇上深思倭情之叵測収回許封之成命眀諭尚書石星總督顧養謙閉關謝使一意防禦毋推諉避事毋因循養亂毋狃一時之便而貽後日之悔侍郎宋應昌郎中劉黄裳倂亟賜罷斥仍正其欺罔誤國之罪則内外逺近曉然知上意所向在於安攘大計孰不更相激厲以圖事功所謂三軍之士不戰而氣自倍倭何足慮哉論修史用人疏先該輔臣王錫爵題請纂修正史起原任詹事劉虞夔充總裁官輿論嘖嘖以為非人臣曰是輔臣援所私而不顧天下之公議也方具疏叅論旋聞同官業已上請竊謂輔臣必聞言而悔滌心而聽則臣可無言矣既奉㫖先該吕坤保薦劉虞夔急宜起用今御史紛紛叅駁孰為公論著該部院定議來説欽此臣仰見皇上深居大内留神章奏采公論於外廷付定議於部院而毫不以成心與也繼而思曰是出於宸衷之主裁與則吕坤保薦事在往年猶然簡在聖心虞夔何人而當此隆眷也抑出於閣臣之票擬與則是以桃李之私情謬為推引而奈何假吕坤之一薦以自文也臣請得而畢其説撫按之臣鎮輯一方境内士夫所改容而禮者也非巨奸豪宦不以列彈章其薦人也不得不寛廟堂之上提衡天下宇内才品所懸鏡而别者也非宏才碩望不以辱弓旌其用人也不得不嚴撫按之保薦㦯偶取其鄉論廟堂之起用必詳核其官評試查各處撫按所薦舉地方人才者能人人而用之乎彼虞夔生平具在去嵗拾遺疏中真士𩔖所不齒聖世所不容者不即罷斥已為漏網遺奸此固滿朝公論輔臣獨不知乎知之而何故復用之乎夫用虞夔也為得意門生而私之也私虞夔而借明㫖以塗天下也借堂官以箝䑓臣也則黨䕶之心化而為機械儻皇上試召輔臣而問不知輔臣何詞以對且今天下多故需人甚急廢謫諸臣無賜環之日中外士紳日夜望輔臣補牘力諍今未能進一君子而先進一邪臣輔臣又将何詞以謝天下乎伏乞明諭輔臣以後用人當秉公心勿植私黨以後擬㫖當持大體勿挾私見則國家之休也亦所以成輔臣之令名也臣再惟修史鉅典也必博訪名流廣招俊士前輔臣䟽有欲取之别署取之外僚取之閒廢取之山林隱逸而必曰文行兼優又曰行義無虧然邪媚如虞夔者首與總栽之選矣苐恐天下之為虞夔者不少也洿行無節徒飾浮華之詞夤縁干進者亦不少也儻誤蒙收録則修史之典適以啓邪臣奔競之途而開小人仕進之竇耳即掇英摛藻何足以昭法誡而垂萬世哉復望諭輔臣及吏部嚴行諮訪務求端方直亮博聞有道術之士毋得濫及匪人以汚清朝盛舉則仕路肅清而國史可傳不朽矣論拔淹滯停例金疏臣待罪諌垣伏睹陛下寤寐英賢軫恤民瘼邇者如孟一脉沈鯉屢推不允者今擢用矣覽科臣所上中州饑民圖說憫然動念發帑銀遣官賑救至宫闈之内亦捐金佐之矣大小臣工莫不踴躍而頌曰陛下天地之量而堯舜之心也顧臣見近來請用廢謫諸臣連章累牘留中不下夫今天下多事正當廣招俊乂搜羅巖穴而諸臣者徃徃以戅直䝉譴其抱效忠之悃具可用之才甚多也一列擯斥之籍永無登進之階是陛下之量猶有未廓歟臣謂天地之生才實難國家之需才甚急諸臣不及時録用恐嵗華相催精神意氣漸隳是清朝有不盡之才而正人有後時之嘆矣且銓臣為陛下用人也尚書陳有年又陛下所特簡者也以請用司屬奉㫖切責累疏求去陛下亦屢降温綸留矣夫畀以銓衡之寄寵以知眷之渥則何不推心委任盡行其志而乃令其抱牘逡巡有懐而莫展也伏乞明諭吏部于先後廢謫諸臣遇缺次用随材序遷則忠直在列而國家收多賢之益矣臣又見昨該雲南撫臣請减加金未䝉俞納夫雲南年例金嵗止二千兩萬厯二十年加至五千兩是加増之數反多于原額旋以閣臣之請减去一千矣又以撫臣之疏而増旋以計臣之請復减一千矣又以科臣之疏而増随减随増綸綍不信非所以重詔令而垂史冊也臣聞滇南採金逺渉川陜風雨瘴癘之所侵虎豹盗賊之所傷辛苦艱難觸目悽慘是金以千計而民間所費與死亡傷夷者不可勝計也陛下居髙處優言千則千耳獨不念供之者甚艱乎况今𬗟氛方熾徴兵轉餉之費公私殚竭而今又益以額外之徴求其何以堪伏乞明諭戸部令該省止觧年例金二千兩如以為内用不給請俯從撫臣之懇停免舊嵗所増一千兩則約巳裕民滇氓徼再造之福矣臣再惟近日言及於罪逐之臣陛下以為市恩言及於滇南之金陛下以為奏凟臣亦豈不知緘黙可以自容哉第念職司耳目誼切匡正當此才乏民困之日而坐視端人淹於屏斥窮陬疲於征輸耳目之謂何臣之罪且不容於堯舜之世是以冐昧塵凟仰回天聼惟願陛下以用沈鯉孟一脉之心盡召逐臣以賑中原之心逺徹遐壤則至仁天壤同流而聖德古今罕並矣論㑹推閣臣疏頃該吏部以㑹推閣臣之故上干聖怒嚴㫖督責降處司官旋以言者申救斥為編氓朝論惜之臣言官也誼不能黙黙無言臣伏惟陛下念閣務繁劇簡任輔臣不即斷自宸衷而先付之廷推以示公也銓臣博訪旁搜䟽名上請公論採之盈庭可否决於聖斷非敢專也亦非敢私也且威福者朝廷之權也該部亦不得而專也予奪者君上之恩也該部亦不得而市也以今聖明在上清議在下一時臣工非至愚不肖誰敢罔上行私自速罪戾而况郎中顧憲成者砥行好修往以直言獲譴陛下起自謫籍而用之矣司銓未乆復遭擯斥士紳相顧咨嗟咸謂憲成以直道被黜而陛下有不容直之名将何以勸任事之心鼓豪傑之氣乎夫用舍者國家之大政也銓臣者又用舍人之人也邇來相繼屏去不竟其用孫鑨去矣陳有年杜門求去矣司官之空署削籍而去者至再至三矣今顧憲成又以罪去前者将竭後焉不續人才凋謝可為寒心語曰察察不可為容容多後福臣恐今而後非如王國光楊巍也者則不能一日為太宰非如徐一檟謝廷寀劉希孟也者則不能一日為部臣臧否混并舉錯倒置将使黜陟重典為權門供愛憎銓衡重地為私門樹桃李天下不知有是非人心不知有勸懲風靡波流莫䆒所終矣大抵近年以來君臣道隔上下異心上所謂可而下未必是也下所謂可而上未必是也用舍一慿喜怒黜罰幾於無章公議壅閼繁言滋起臣謂人才消長之機理道廢興之漸正在於此故願陛下虚心而觀也然臣又有言焉㑹推閣臣非自十九年始也皇祖二十八年廷推六員而張治李本二臣用即今元輔王錫爵之入閣也亦㑹推也葢特簡與廷推祖宗朝並行巳乆而要之廷推必諧於僉議特簡或由於私援故舜舉臯陶湯舉伊尹而必曰選於衆今輔臣趙志臯等不稽故典不惟逺圖妄為牽引熒激聖怒即掲救數語譬之强笑而神不偕來欲以動聽難矣方今疆場交聳公私耗竭而嗷嗷思亂者又十室而九識者抱厝火積薪之憂所幸公道昭白仕路清夷宰輔無私人朝廷無過舉可以囘氣化而收人心而今時事至此可為長嘆臣職司獻納冐昧塵凟非為銓司惜一郎官也為國家惜人才也為國家惜政體也亦願廟堂之上共捐成心而重為國體人才惜也臣不勝惓惓兩垣奏議
